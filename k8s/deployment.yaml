apiVersion: apps/v1
kind: Deployment
metadata:
  name: kanban-deployment
  namespace: kanban-prod
  labels:
    app: kanban-board
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kanban-board
  template:
    metadata:
      labels:
        app: kanban-board
    spec:
      containers:
      - name: kanban-container
        image: DOCKERHUB_USERNAME/kanban-board:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000